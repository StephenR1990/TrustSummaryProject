<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Create Daily Record | Trust Summary</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
	<script src="{{ url_for('static', filename='numbers.js') }}"></script>
</head>
<body>
	<main class="page-shell">
		<header class="page-header">
			<div>
				<h1>Create new daily record</h1>
				<p>Logged in as {{ username }}.</p>
			</div>
			<div class="actions">
				<form class="inline-form" action="{{ url_for('summarylist') }}">
					<input class="secondary" type="submit" value="Back to Summary">
				</form>
				<form class="inline-form" action="{{ url_for('logout') }}">
					<input class="secondary" type="submit" value="Logout">
				</form>
			</div>
		</header>

		<section class="card">
			<h2>Record details</h2>
			<div class="msg">{{ msg }}</div>
			<form action="{{ url_for('adddailyrecord') }}" method="post">
				<div class="form-grid">
					<div class="form-field">
						<label for="ReportDate">Date</label>
						<input type="date" name="ReportDate" id="ReportDate">
					</div>
					<div class="form-field">
						<label for="SiteManager">Site Manager</label>
						<input type="text" name="SiteManager" id="SiteManager">
					</div>
					<div class="form-field">
						<label for="PatientsInCorridor">Patients In Corridor</label>
						<input type="number" name="PatientsInCorridor" id="PatientsInCorridor" min="0">
					</div>
					<div class="form-field">
						<label for="EscalationLevel">Escalation Level</label>
						<select name="EscalationLevel" id="EscalationLevel">
							<option value="">Select level</option>
							<option value="Green">Green</option>
							<option value="Amber">Amber</option>
							<option value="Red">Red</option>
						</select>
						<span class="form-hint">Choose Red, Amber or Green.</span>
					</div>
					<div class="form-field">
						<label for="TriageTimehrs">Triage Time (hrs)</label>
						<input type="text" name="TriageTimehrs" id="TriageTimehrs" onkeypress="return isNumberKey(this, event);">
					</div>
					<div class="form-field">
						<label for="PatientsAwaitingBeds">Patients Awaiting Beds</label>
						<input type="number" name="PatientsAwaitingBeds" id="PatientsAwaitingBeds" min="0">
					</div>
					<div class="form-field">
						<label for="WaitingTimeMajorshrs">Waiting Time Majors (hrs)</label>
						<input type="text" name="WaitingTimeMajorshrs" id="WaitingTimeMajorshrs" onkeypress="return isNumberKey(this, event);">
					</div>
					<div class="form-field">
						<label for="TotalPatientsED">Total Patients in ED</label>
						<input type="number" name="TotalPatientsED" id="TotalPatientsED" min="0">
					</div>
				</div>
				<div class="actions" style="margin-top: 22px;">
					<input type="submit" value="Save Record">
				</div>
			</form>
		</section>
	</main>
</body>
</html>
