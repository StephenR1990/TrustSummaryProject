<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Daily Record Detail | Trust Summary</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
	<script src="{{ url_for('static', filename='numbers.js') }}"></script>
</head>
<body>
	<main class="page-shell">
		{% if entries %}
		<header class="page-header">
			<div>
				<h1>Trust Summary detail for {{ entries.dte }}</h1>
				<p>Welcome back, {{ username }}.</p>
			</div>
			<div class="actions">
				<form class="inline-form" action="{{ url_for('summarylist') }}">
					<input class="secondary" type="submit" value="Back to Summary">
				</form>
				<form class="inline-form" action="{{ url_for('logout') }}">
					<input class="secondary" type="submit" value="Logout">
				</form>
			</div>
		</header>

		<section class="card">
			<h2>Edit record</h2>
			<div class="msg">{{ msg }}</div>
			<form action="{{ url_for('dailydetail', dayid=dayid) }}" method="post">
				<div class="form-grid">
					<div class="form-field">
						<label for="SiteManager">Site Manager</label>
						<input type="text" value="{{ entries.SiteManager }}" name="SiteManager" id="SiteManager">
					</div>
					<div class="form-field">
						<label for="PatientsInCorridor">Patients In Corridor</label>
						<input type="number" value="{{ entries.PatientsInCorridor }}" name="PatientsInCorridor" id="PatientsInCorridor" min="0">
					</div>
					<div class="form-field">
						<label for="EscalationLevel">Escalation Level</label>
						<select name="EscalationLevel" id="EscalationLevel">
                            <option selected value="{{ entries.EscalationLevel }}">{{ entries.EscalationLevel }}</option>
							<option value="Green">Green</option>
							<option value="Amber">Amber</option>
							<option value="Red">Red</option>
						</select>
					</div>
					<div class="form-field">
						<label for="TriageTimehrs">Triage Time (hrs)</label>
						<input type="text" value="{{ entries.TriageTimehrs }}" name="TriageTimehrs" id="TriageTimehrs" onkeypress="return isNumberKey(this, event);">
					</div>
					<div class="form-field">
						<label for="PatientsAwaitingBeds">Patients Awaiting Beds</label>
						<input type="number" value="{{ entries.PatientsAwaitingBeds }}" name="PatientsAwaitingBeds" id="PatientsAwaitingBeds" min="0">
					</div>
					<div class="form-field">
						<label for="WaitingTimeMajorshrs">Waiting Time Majors (hrs)</label>
						<input type="text" value="{{ entries.WaitingTimeMajorshrs }}" name="WaitingTimeMajorshrs" id="WaitingTimeMajorshrs" onkeypress="return isNumberKey(this, event);">
					</div>
					<div class="form-field">
						<label for="TotalPatientsED">Total Patients in ED</label>
						<input type="number" value="{{ entries.TotalPatientsED }}" name="TotalPatientsED" id="TotalPatientsED" min="0">
					</div>
				</div>
				<div class="actions" style="margin-top: 22px;">
					<input type="submit" value="Save Changes">
				</div>
			</form>
		</section>

		{% if 'Admin' in acctype %}
		<section class="card">
			<div class="card-header">
				<div>
					<h2>Danger zone</h2>
					<p class="form-hint">Deleting a record cannot be undone.</p>
				</div>
				<form class="inline-form" action="{{ url_for('deleterecord', dayid=dayid) }}">
					<input class="danger" type="submit" value="Delete Record" onclick="return confirm('Are you sure you want to delete the record?')">
				</form>
			</div>
		</section>
		{% endif %}
		{% else %}
		<section class="card">
			<div class="empty-state">No record found.</div>
		</section>
		{% endif %}
	</main>
</body>
</html>
