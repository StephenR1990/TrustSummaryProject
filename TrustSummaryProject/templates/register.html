<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register | Trust Summary</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
</head>
<body class="auth-page">
	<main class="auth-card">
		<h1>Create Account</h1>
		<div class="links">
			<a href="{{ url_for('login') }}">Login</a>
			<a href="{{ url_for('register') }}" class="active">Register</a>
		</div>
		<form class="auth-form" action="{{ url_for('register') }}" method="post" autocomplete="off">
			<label class="icon-label" for="username" aria-label="Username"><i class="fas fa-user"></i></label>
			<input type="text" name="username" placeholder="Username" id="username" required>

			<label class="icon-label" for="password" aria-label="Password"><i class="fas fa-lock"></i></label>
			<input type="password" name="password" placeholder="Password" id="password" required>

			<label class="icon-label" for="fullname" aria-label="Full name"><i class="fas fa-id-card"></i></label>
			<input type="text" name="fullname" placeholder="Full name" id="fullname" required>

			<label class="icon-label" for="accounttype" aria-label="Account type"><i class="fas fa-user-shield"></i></label>
			<select name="accounttype" id="accounttype">
				<option value="User">User</option>
				<option value="Admin">Admin</option>
			</select>

				<div class="msg">{{ msg }}</div>
				<input type="submit" value="Register">
</form>
	</main>
</body>
</html>
