<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login | Trust Summary</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
</head>
<body class="auth-page">
	<main class="auth-card">
		<h1>Trust Summary</h1>
		<div class="links">
			<a href="{{ url_for('login') }}" class="active">Login</a>
			<a href="{{ url_for('register') }}">Register</a>
		</div>
		<form class="auth-form" action="{{ url_for('login') }}" method="post">
			<label class="icon-label" for="username" aria-label="Username"><i class="fas fa-user"></i></label>
			<input type="text" name="username" placeholder="Username" id="username" required>

			<label class="icon-label" for="password" aria-label="Password"><i class="fas fa-lock"></i></label>
			<input type="password" name="password" placeholder="Password" id="password" required>

			<div class="msg">{{ msg }}</div>
			<input type="submit" value="Login">
		</form>
	</main>
</body>
</html>
